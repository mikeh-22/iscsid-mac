name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Build + unit tests on macOS arm64 (Debug and Release)
  # Debug build enables AddressSanitizer + UBSan.
  # -------------------------------------------------------------------------
  build-and-test:
    name: Build & test (${{ matrix.build_type }})
    runs-on: macos-15           # arm64 Apple Silicon hosted runner
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit tests
        run: ctest --test-dir build -V --output-on-failure

      - name: Upload binaries (Release only)
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: iscsid-mac-arm64
          path: |
            build/iscsid
            build/iscsictl
          retention-days: 7

  # -------------------------------------------------------------------------
  # Integration test: validate the iSCSI target image and protocol.
  #
  # Runs on Ubuntu where Docker is available natively (no nested VM needed).
  # Starts a tgt iSCSI target as a service container, then uses a small
  # Python script to perform a real iSCSI login + SendTargets exchange,
  # validating the same PDU wire format that iscsid uses.
  #
  # Note: the iscsid daemon binary is macOS-only (uses CommonCrypto).
  # Full end-to-end daemon testing requires local Docker — see CLAUDE.md.
  # -------------------------------------------------------------------------
  integration-test:
    name: Integration test (tgt protocol)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start iSCSI target
        run: |
          docker build -t iscsid-mac-target tests/target/
          docker run -d --name iscsi-target --privileged \
            -p 3260:3260 iscsid-mac-target
          # Wait for tgtd to be ready
          for i in $(seq 1 15); do
            nc -z 127.0.0.1 3260 2>/dev/null && echo "Target ready" && break
            echo "Waiting for target... ($i)"
            sleep 2
          done
          docker logs iscsi-target

      - name: iSCSI protocol test (login + SendTargets)
        run: |
          python3 tests/integration/test_target.py
        env:
          ISCSI_HOST: 127.0.0.1
          ISCSI_PORT: 3260
          EXPECTED_IQN: iqn.2024-01.io.iscsid-mac:test

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== docker target logs ==="
          docker logs iscsi-target 2>/dev/null || true
