name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Build + unit tests on macOS arm64 (Debug and Release)
  # Debug build enables AddressSanitizer + UBSan.
  # -------------------------------------------------------------------------
  build-and-test:
    name: Build & test (${{ matrix.build_type }})
    runs-on: macos-15           # arm64 Apple Silicon hosted runner
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CMake
        run: brew install cmake

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit tests
        run: ctest --test-dir build -V --output-on-failure

      - name: Upload binaries (Release only)
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: iscsid-mac-arm64
          path: |
            build/iscsid
            build/iscsictl
          retention-days: 7

  # -------------------------------------------------------------------------
  # Integration test: validate the iSCSI target image and protocol.
  #
  # Runs on Ubuntu where Docker is available natively (no nested VM needed).
  # Starts a tgt iSCSI target as a service container, then uses a small
  # Python script to perform a real iSCSI login + SendTargets exchange,
  # validating the same PDU wire format that iscsid uses.
  #
  # Note: the iscsid daemon binary is macOS-only (uses CommonCrypto).
  # Full end-to-end daemon testing requires local Docker — see CLAUDE.md.
  # -------------------------------------------------------------------------
  integration-test:
    name: Integration test (tgt protocol)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and start iSCSI target
        run: |
          docker build -t iscsid-mac-target tests/target/
          docker run -d --name iscsi-target --privileged \
            -p 3260:3260 iscsid-mac-target
          # Wait for tgtd to be ready
          for i in $(seq 1 15); do
            nc -z 127.0.0.1 3260 2>/dev/null && echo "Target ready" && break
            echo "Waiting for target... ($i)"
            sleep 2
          done
          docker logs iscsi-target

      - name: Install and start open-iscsi
        run: |
          sudo apt-get install -y open-iscsi
          sudo modprobe iscsi_tcp 2>&1 && echo "iscsi_tcp loaded" || echo "WARN: iscsi_tcp not loadable"
          lsmod | grep iscsi || echo "No iscsi modules in lsmod"
          sudo systemctl start iscsid
          sudo systemctl status iscsid --no-pager

      - name: iSCSI protocol test (SendTargets discovery + login)
        run: |
          TARGET_IQN="iqn.2024-01.io.iscsid-mac:test"

          # SendTargets discovery — tgt reports its Docker-internal IP,
          # so capture the portal address from the discovery output.
          sudo iscsiadm -m discovery -t st -p 127.0.0.1:3260 \
            | tee /tmp/discovery.out
          grep -q "$TARGET_IQN" /tmp/discovery.out

          # Extract portal address (format: "ip:port,tag iqn")
          PORTAL=$(grep "$TARGET_IQN" /tmp/discovery.out | awk '{print $1}' | cut -d, -f1)
          echo "Portal: $PORTAL"

          # Log in using the portal address recorded by iscsiadm
          sudo iscsiadm -m node -T "$TARGET_IQN" -p "$PORTAL" --login

          # Verify session is active
          sudo iscsiadm -m session | tee /tmp/session.out
          grep -q "$TARGET_IQN" /tmp/session.out

          # Log out cleanly
          sudo iscsiadm -m node -T "$TARGET_IQN" -p "$PORTAL" --logout

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== docker target logs ==="
          docker logs iscsi-target 2>/dev/null || true
