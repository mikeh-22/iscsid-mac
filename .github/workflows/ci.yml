name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Build + unit tests on macOS arm64
  # Debug: AddressSanitizer + UBSan   Release: optimised
  # -------------------------------------------------------------------------
  build-and-test:
    name: Build & test (${{ matrix.build_type }})
    runs-on: macos-15           # arm64 (Apple Silicon hosted runner)
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit tests
        run: ctest --test-dir build -V --output-on-failure

      - name: Upload binaries (Release only)
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: iscsid-mac-arm64
          path: |
            build/iscsid
            build/iscsictl
          retention-days: 7

  # -------------------------------------------------------------------------
  # Integration test: real iSCSI target via colima (QEMU, no nested-virt)
  # Tests the full login/logout/discover flow against a live tgt instance.
  # -------------------------------------------------------------------------
  integration-test:
    name: Integration test (colima + tgt)
    runs-on: macos-15
    # Run after unit tests pass to avoid wasting colima startup time
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake colima docker

      - name: Configure & build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Start colima (QEMU — no hardware virtualisation needed)
        run: |
          colima start \
            --arch aarch64 \
            --vm-type qemu \
            --cpu 2 --memory 4 \
            --dns 1.1.1.1
          # Wait until the Docker socket is ready (up to 3 min)
          for i in $(seq 1 45); do
            docker info >/dev/null 2>&1 && echo "Docker ready" && break
            echo "Waiting… ($i)"
            sleep 4
          done
          docker info

      - name: Build iSCSI target image
        run: docker build -t iscsid-mac-target tests/target/

      - name: Start iSCSI target
        run: |
          docker run -d --name iscsi-target --privileged -p 3260:3260 \
            iscsid-mac-target
          # Give tgtd a moment to initialise
          sleep 3
          docker logs iscsi-target

      - name: Start iscsid daemon
        run: |
          ./build/iscsid -s /tmp/iscsid-test.sock -f -d \
            > /tmp/iscsid.log 2>&1 &
          echo $! > /tmp/iscsid.pid
          sleep 1

      - name: ping
        run: ./build/iscsictl -s /tmp/iscsid-test.sock ping

      - name: discover
        run: |
          ./build/iscsictl -s /tmp/iscsid-test.sock discover \
            -h 127.0.0.1 -p 3260 | tee /tmp/discover.out
          grep -q "iqn.2024-01.io.iscsid-mac:test" /tmp/discover.out

      - name: login
        run: |
          ./build/iscsictl -s /tmp/iscsid-test.sock \
            login -h 127.0.0.1 -p 3260 -t iqn.2024-01.io.iscsid-mac:test

      - name: list (expect LOGGED_IN)
        run: |
          ./build/iscsictl -s /tmp/iscsid-test.sock list | tee /tmp/list.out
          grep -q "LOGGED_IN" /tmp/list.out

      - name: logout
        run: |
          ./build/iscsictl -s /tmp/iscsid-test.sock \
            logout -t iqn.2024-01.io.iscsid-mac:test

      - name: list (expect empty)
        run: |
          ./build/iscsictl -s /tmp/iscsid-test.sock list | tee /tmp/list2.out
          grep -q "No active sessions" /tmp/list2.out

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== iscsid log ==="
          cat /tmp/iscsid.log 2>/dev/null || true
          echo "=== docker target logs ==="
          docker logs iscsi-target 2>/dev/null || true
          echo "=== colima log ==="
          colima status 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/iscsid.pid 2>/dev/null)" 2>/dev/null || true
          docker stop iscsi-target 2>/dev/null || true
          docker rm   iscsi-target 2>/dev/null || true
          colima stop 2>/dev/null || true
